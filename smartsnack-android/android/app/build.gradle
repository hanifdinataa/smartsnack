plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.sugarcare_flutter"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.sugarcare_flutter"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            // Keep release build stable for local APK distribution/testing.
            // Can be turned on again after keep-rules are finalized.
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // ML Kit script-specific recognizers referenced by plugin at runtime.
    implementation "com.google.mlkit:text-recognition-chinese:16.0.0"
    implementation "com.google.mlkit:text-recognition-devanagari:16.0.0"
    implementation "com.google.mlkit:text-recognition-japanese:16.0.0"
    implementation "com.google.mlkit:text-recognition-korean:16.0.0"

    // Use a newer TFLite runtime so newer exported models can load ops such as
    // FULLY_CONNECTED v12 on Android.
    implementation "org.tensorflow:tensorflow-lite:2.17.0"
    implementation "org.tensorflow:tensorflow-lite-api:2.17.0"
    implementation "org.tensorflow:tensorflow-lite-support:0.4.4"
    implementation "org.tensorflow:tensorflow-lite-gpu:2.17.0"
    implementation "org.tensorflow:tensorflow-lite-gpu-delegate-plugin:0.4.4"
}

flutter {
    source = "../.."
}

def flutterToolExpectedOutputDir = new File(rootProject.projectDir.parentFile, "build/app/outputs/flutter-apk")
afterEvaluate {
    def assembleDebugTask = tasks.findByName("assembleDebug")
    if (assembleDebugTask != null) {
        assembleDebugTask.doLast {
            copy {
                from(new File(rootProject.buildDir, "app/outputs/flutter-apk"))
                into(flutterToolExpectedOutputDir)
                include("app-debug.apk")
            }
        }
    }

    def assembleReleaseTask = tasks.findByName("assembleRelease")
    if (assembleReleaseTask != null) {
        assembleReleaseTask.doLast {
            copy {
                from(new File(rootProject.buildDir, "app/outputs/flutter-apk"))
                into(flutterToolExpectedOutputDir)
                include("app-release.apk")
            }
        }
    }
}
